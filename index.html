                <div class="task-item-main">
                    <div style="display:flex;flex-direction:column;gap:5px;min-width:0;">
                        <span style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHTML(task.title)}</span>
                        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
                            ${namePillHTML}
                            <span class="badge-type" style="color:${config.color};background-color:${config.color}1A;">
                                ${config.icon} ${escapeHTML(task.type)}
                            </span>
                        </div>
                    </div>
                    <div class="task-action-btns">
                        ${editBtn}
                        ${deleteBtn}
                    </div>
                </div>
                <div class="task-edit-form" id="edit-form-${index}">
                    <input type="text" id="edit-title-${index}" value="${escapeHTML(task.title)}" placeholder="Task name...">
                    <div class="task-edit-form-row">
                        <select id="edit-type-${index}">${typeOptions}</select>
                        <button class="btn-save-task" onclick="saveEditTask(${index})">✓ Save</button>
                        <button class="btn-cancel-edit" onclick="cancelEditTask(${index})">Cancel</button>
                    </div>
                </div>
            `;
                listEl.appendChild(li);
            });
        }

        window.toggleEditTask = (index, btn) => {
            const allItems = document.querySelectorAll('.task-item');
            // Close other open edit forms first
            allItems.forEach((item, i) => {
                if (i !== index) {
                    item.classList.remove('editing');
                    const editBtn = item.querySelector('.btn-edit-task');
                    if (editBtn) editBtn.textContent = '✏️ Edit';
                }
            });
            const li = btn.closest('.task-item');
            const isEditing = li.classList.toggle('editing');
            btn.textContent = isEditing ? '✕ Close' : '✏️ Edit';
            if (isEditing) {
                const input = document.getElementById(`edit-title-${index}`);
                if (input) { input.focus(); input.select(); }
            }
        };

        window.cancelEditTask = (index) => {
            const form = document.getElementById(`edit-form-${index}`);
            if (!form) return;
            const li = form.closest('.task-item');
            li.classList.remove('editing');
            const editBtn = li.querySelector('.btn-edit-task');
            if (editBtn) editBtn.textContent = '✏️ Edit';
        };

        window.saveEditTask = async (index) => {
            const newTitle = document.getElementById(`edit-title-${index}`).value.trim();
            const newType = document.getElementById(`edit-type-${index}`).value;
            if (!newTitle) { alert('Task name cannot be empty!'); return; }

            const tasks = tasksData[selectedDateStr];
            if (!tasks || !tasks[index]) return;

            // Permission check
            const task = tasks[index];
            const isSadmin = currentUserData && currentUserData.role === 'sadmin';
            const isOwner = task.createdBy === currentUser.uid;
            if (!isSadmin && !isOwner) {
                alert('You can only edit your own tasks.');
                return;
            }

            tasks[index] = { ...task, title: newTitle, type: newType };
            await set(ref(db, 'tasksData'), tasksData);
            // renderTaskList() will be called via onValue
        };

        // Update the color dot next to type selector
        window.updateTypeColorDot = () => {
            const type = document.getElementById('new-task-type').value;
            const config = TASK_TYPES[type];
            const dot = document.getElementById('type-color-dot');
            if (dot && config) dot.style.background = config.color;
        };

        window.addTask = async () => {
            const titleInput = document.getElementById('new-task-title');
            const title = titleInput.value.trim();
            const type = document.getElementById('new-task-type').value;
            if (!title) {
                titleInput.focus();
                titleInput.style.borderBottom = '2px solid var(--danger-color)';
                setTimeout(() => titleInput.style.borderBottom = '', 1500);
                return;
            }

            if (!tasksData[selectedDateStr]) tasksData[selectedDateStr] = [];
            tasksData[selectedDateStr].push({ title, type, createdBy: currentUser.uid });

            await set(ref(db, 'tasksData'), tasksData);
            titleInput.value = '';
            titleInput.focus();
        };

        window.deleteTask = async (index) => {
            if (!tasksData[selectedDateStr]) return;
            const task = tasksData[selectedDateStr][index];
            const isSadmin = currentUserData && currentUserData.role === 'sadmin';
            const isOwner = task && task.createdBy === currentUser.uid;
            if (!isSadmin && !isOwner) {
                alert('You can only delete your own tasks.');
                return;
            }
            tasksData[selectedDateStr].splice(index, 1);
            if (tasksData[selectedDateStr].length === 0) delete tasksData[selectedDateStr];
            await set(ref(db, 'tasksData'), tasksData);
        };

        // 工具函数
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        function showAlert(id, msg, type) {
            const el = document.getElementById(id);
            if (!msg) { el.className = 'alert'; return; }
            el.textContent = msg; el.className = `alert ${type}`;
        }

        // 点击背景关闭弹窗
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                    showAlert('create-alert', '', false);
                }
            });
        });

    </script>
</body>

</html>
